// DB HELPERS
// ═══════════════════════════════════════════════════════════
async function dbGetPlates() {
  try {
    const snap = await getDoc(doc(db, "config", "plates"));
    return snap.exists() ? snap.data().data : {};
  } catch(e) { console.error(e); return {}; }
}
async function dbSavePlates(plates) {
  await setDoc(doc(db, "config", "plates"), { data: plates });
}

async function dbGetStatus(carrier, plate, dateStr) {
  try {
    const id = `${carrier}__${plate}__${dateStr}`;
    const snap = await getDoc(doc(db, "availability", id));
    if(!snap.exists()) return null;
    const d = snap.data();
    return { status: d.status, time: d.time||"" };
  } catch { return null; }
}
async function dbSaveStatus(carrier, plate, dateStr, status, time) {
  const id = `${carrier}__${plate}__${dateStr}`;
  await setDoc(doc(db, "availability", id), {
    carrier, plate, dateStr, status, time: time||"", filled: true,
    updatedAt: new Date().toISOString()
  });
}

async function dbGetNotifs() {
  try {
    const snap = await getDoc(doc(db, "config", "notifications"));
    return snap.exists() ? (snap.data().items || []) : [];
  } catch { return []; }
}
async function dbAddNotif(msg) {
  const items = await dbGetNotifs();
  items.unshift({ msg, time: new Date().toLocaleString("pt-BR") });
  if(items.length > 50) items.length = 50;
  await setDoc(doc(db, "config", "notifications"), { items });
}
async function dbClearNotifs() {
  await setDoc(doc(db, "config", "notifications"), { items: [] });
}

// Users config
async function dbGetUsers() {
  try {
    const snap = await getDoc(doc(db, "config", "users"));
    return snap.exists() ? snap.data().data : null;
  } catch(e) { return null; }
}
async function dbSaveUsers(users) {
  await setDoc(doc(db, "config", "users"), { data: users });
}
// Carriers config
async function dbGetCarriers() {
  try {
    const snap = await getDoc(doc(db, "config", "carriers"));
    return snap.exists() ? snap.data().list : null;
  } catch(e) { return null; }
}
async function dbSaveCarriers(list) {
  await setDoc(doc(db, "config", "carriers"), { list });
}
// Load users and carriers from Firebase, fall back to defaults
async function loadConfig() {
  const [fbUsers, fbCarriers] = await Promise.all([dbGetUsers(), dbGetCarriers()]);
  if(fbUsers) USERS_DB = fbUsers;
  if(fbCarriers) CARRIERS = fbCarriers;
}

// Bulk load status for many plates/dates at once (batched reads)
async function dbLoadStatusBulk(pairs) {
  // pairs = [{carrier,plate,dateStr}]
  // Returns {key: {status, time} | null}
  const result = {};
  await Promise.all(pairs.map(async ({carrier,plate,dateStr}) => {
    const key = `${carrier}||${plate}||${dateStr}`;
    result[key] = await dbGetStatus(carrier, plate, dateStr);
  }));
  return result;
}

function getSt(v){ return STATUS_OPTS.find(s=>s.val===v)||STATUS_OPTS[0]; }
function buildTimeOpts(selected=""){
  let opts=`<option value="" ${!selected?'selected':''} disabled>— Horário —</option>`;
  for(let h=0;h<24;h++){
    for(let m=0;m<60;m+=15){
      const hh=String(h).padStart(2,'0');
      const mm=String(m).padStart(2,'0');
      const val=`${hh}:${mm}`;
      opts+=`<option value="${val}"${val===selected?' selected':''}>${val}</option>`;
    }
  }
  // also add :59 for 23
  opts+=`<option value="23:59"${'23:59'===selected?' selected':''}>23:59</option>`;
  return opts;
}
function dateStr(off=0){ const d=new Date(); d.setDate(d.getDate()+off); return d.toISOString().slice(0,10); }
function fmtDate(off=0){
  const d=new Date(); d.setDate(d.getDate()+off);
  const days=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const mons=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const tag=off===0?" — Hoje":off===1?" — Amanhã":off===-1?" — Ontem":"";
  return `${days[d.getDay()]}, ${d.getDate()} ${mons[d.getMonth()]}${tag}`;
}
function fmtDateStr(ds){
  const d=new Date(ds+"T12:00:00");
  const days=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const mons=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return `${days[d.getDay()]}, ${d.getDate()} ${mons[d.getMonth()]}`;
}
function showToast(msg,ok=true){
  const t=document.getElementById("toast");
  document.getElementById("toast-msg").textContent=msg;
  t.style.background=ok?"var(--lime)":"#f06060";
  t.style.color=ok?"var(--dark)":"#fff";
  t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3000);
}
function setLoading(msg="Carregando..."){
  const mc=document.getElementById("main-content")||document.getElementById("tab-body");
  if(mc) mc.innerHTML=`<div class="loading"><span class="spin"></span>${msg}</div>`;
}
function getDates(days,fromOff=0){
  const arr=[];
  for(let i=days-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i+fromOff); arr.push(d.toISOString().slice(0,10)); }
  return arr;
}
function getMonthDates(year,month){
  const arr=[]; const d=new Date(year,month,1);
  while(d.getMonth()===month){ arr.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return arr;
}

}
function doLogin(){
  const uid=document.getElementById("user-input").value.trim().toLowerCase();
  const pwd=document.getElementById("pwd").value;
  const err=document.getElementById("login-err");
  if(!uid){err.textContent="Informe o usuário.";return;}
  if(!pwd){err.textContent="Informe a senha.";return;}
  if(!USERS_DB[uid]){err.textContent="Usuário não encontrado.";return;}
  if(USERS_DB[uid].password!==pwd){err.textContent="Senha incorreta.";return;}
  S.user=uid; S.dateOffset=0; render();
}
function logout(){ S.user=null; S.notifOpen=false; render(); }

async function renderCarrier(carrier){
  const ds=dateStr(S.dateOffset);
  const mc=document.getElementById("main-content");
  mc.innerHTML=`<p class="sec-title">Disponibilidade da frota</p><p class="sec-sub">${carrier}</p><div class="loading"><span class="spin"></span>Carregando placas...</div>`;
  const allP=await dbGetPlates();
  const plates=allP[carrier]||[];
  if(plates.length===0){
    mc.innerHTML=`<p class="sec-title">Disponibilidade da frota</p><p class="sec-sub">${carrier}</p>
      <div class="empty"><span class="ei">🚫</span>Nenhuma placa cadastrada.<br>Aguarde o administrador.</div>`;
    return;
  }
  const pairs=plates.map(p=>({carrier,plate:p.placa,dateStr:ds}));
  const statusMap=await dbLoadStatusBulk(pairs);
  const rows=plates.map(p=>{
    const rec=statusMap[`${carrier}||${p.placa}||${ds}`]; // null = não preenchido
    const cur=rec?rec.status:null;
    const curTime=rec?rec.time:"";
    const blankOpt=cur===null?`<option value="" selected disabled>— Selecione —</option>`:"";
    const sOpts=blankOpt+STATUS_OPTS.map(s=>`<option value="${s.val}"${cur===s.val?" selected":""}>${s.label}</option>`).join("");
    const st=cur?getSt(cur):null;
    const selCls=cur?`st-sel ${st.cls}`:`st-sel st-blank`;
    const isIndisp=cur==='indisponivel'||cur==='programado';
    const timeCls=isIndisp?`time-sel time-na`:curTime?`time-sel time-filled`:`time-sel time-blank`;
    const timeDisabled=(!cur||isIndisp)?'disabled':'';
    return `<tr>
      <td style="font-weight:500;font-family:'DM Mono',monospace">${p.placa}</td>
      <td style="font-size:12px;color:var(--muted)">${p.operacao}</td>
      <td><span class="badge b-lime">${p.tipo}</span></td>
      <td><select class="${selCls}" onchange="onStChange(this)">${sOpts}</select></td>
      <td><select class="${timeCls}" ${timeDisabled} onchange="onTimeChange(this)">${isIndisp?`<option value="">N/A</option>`:buildTimeOpts(curTime)}</select></td>
    </tr>`;
  }).join("");
  mc.innerHTML=`
    <p class="sec-title">Disponibilidade da frota</p>
    <p class="sec-sub">${carrier} — Informe o status de cada veículo</p>
    <div class="date-nav">
      <button onclick="chDate(-1)">‹</button>
      <span class="date-label">${fmtDate(S.dateOffset)}</span>
      <button onclick="chDate(1)">›</button>
    </div>
    <div class="tscroll">
      <table class="table">
        <thead><tr><th>PLACA</th><th>OPERAÇÃO</th><th>TIPO</th><th>STATUS</th><th>DISPONÍVEL ÀS</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="display:flex;gap:10px;margin-top:1rem;">
      <button class="btn btn-lime" id="save-btn" onclick="saveAll('${carrier}','${ds}')">💾 Salvar disponibilidade</button>
    </div>`;
}
function onStChange(sel){
  const row=sel.closest('tr');
  const timeSel=row?row.querySelector('.time-sel'):null;
  if(!sel.value){
    sel.className='st-sel st-blank';
    if(timeSel){timeSel.disabled=true;timeSel.value='';timeSel.className='time-sel time-blank';}
    return;
  }
  const st=getSt(sel.value);
  sel.className=`st-sel ${st.cls}`;
  if(timeSel){
    if(sel.value==='indisponivel'||sel.value==='programado'){
      // Horário não se aplica para indisponível e programado/em viagem
      timeSel.disabled=true;
      timeSel.value='';
      timeSel.className='time-sel time-na';
    } else {
      timeSel.disabled=false;
      if(timeSel.className==='time-sel time-na') timeSel.className='time-sel time-blank';
    }
  }
}
function onTimeChange(sel){
  if(sel.value) sel.className='time-sel time-filled';
  else sel.className='time-sel time-blank';
}
async function saveAll(carrier,ds){
  const btn=document.getElementById("save-btn");
  const rows=document.querySelectorAll(".table tbody tr");
  // Validate: all rows must have status AND time filled
  let missing=[];
  rows.forEach(row=>{
    const plate=row.cells[0].textContent.trim();
    const statusSel=row.querySelector(".st-sel,.st-blank");
    const timeSel=row.querySelector(".time-sel");
    const hasStatus=statusSel&&statusSel.value;
    const isIndisp=statusSel&&(statusSel.value==='indisponivel'||statusSel.value==='programado');
    const hasTime=timeSel&&timeSel.value;
    if(!hasStatus||(! isIndisp&&!hasTime)) missing.push(plate);
  });
  if(missing.length>0){
    showToast(`Preencha status e horário de todas as placas antes de salvar.`,false);
    // Highlight missing rows
    rows.forEach(row=>{
      const plate=row.cells[0].textContent.trim();
      if(missing.includes(plate)) row.style.background="rgba(240,96,96,.08)";
      else row.style.background="";
    });
    return;
  }
  if(btn){btn.disabled=true;btn.textContent="Salvando...";}
  const proms=[];
  rows.forEach(row=>{
    const plate=row.cells[0].textContent.trim();
    const statusSel=row.querySelector(".st-sel");
    const timeSel=row.querySelector(".time-sel");
    proms.push(dbSaveStatus(carrier,plate,ds,statusSel.value,timeSel.value));
  });
  await Promise.all(proms);
  const u=USERS_DB[S.user];
  await dbAddNotif(`${u.name} atualizou a disponibilidade — ${fmtDateStr(ds)}`);
  showToast("Disponibilidade salva!");
  if(btn){btn.disabled=false;btn.innerHTML="💾 Salvar disponibilidade";}
  await renderCarrier(carrier);
}
async function chDate(d){ S.dateOffset+=d; await render(); }

  });

async function renderTabBody(){
  const body=document.getElementById("tab-body");
  if(!body) return;
  if(S.adminTab==="dashboard") await renderDashboard(body);
  else if(S.adminTab==="today") await renderToday(body);

  else await renderUsers(body);
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════
async function renderDashboard(body){
  body.innerHTML=`<div class="loading"><span class="spin"></span>Carregando dashboard...</div>`;
  const ds=dateStr(S.dateOffset);
  const allP=await dbGetPlates();
  // Build all pairs for today
  const allPairs=[];
  for(const carrier of CARRIERS) for(const p of (allP[carrier]||[])) allPairs.push({carrier,plate:p.placa,dateStr:ds});
  const statusMap=await dbLoadStatusBulk(allPairs);
  let counts={disponivel:0,indisponivel:0,manutencao:0,folga:0,total:0};
  let byCarrier={};
  for(const carrier of CARRIERS){
    byCarrier[carrier]={disponivel:0,indisponivel:0,manutencao:0,folga:0};
    for(const p of (allP[carrier]||[])){
      const rec=statusMap[`${carrier}||${p.placa}||${ds}`]; // null = não preenchido
      const v=rec?rec.status:null;
      if(v){ counts[v]=(counts[v]||0)+1; byCarrier[carrier][v]=(byCarrier[carrier][v]||0)+1; }
      counts.total++;
    }
  }
  // 14 days trend
  const tDates=getDates(14);
  const tPairs=[];
  for(const d of tDates) for(const carrier of CARRIERS) for(const p of (allP[carrier]||[])) tPairs.push({carrier,plate:p.placa,dateStr:d});
  const tMap=await dbLoadStatusBulk(tPairs);
  const tDisp=tDates.map(d=>{
    let c=0;
    for(const carrier of CARRIERS) for(const p of (allP[carrier]||[])) if((tMap[`${carrier}||${p.placa}||${d}`]||"disponivel")==="disponivel") c++;
    return c;
  });

  body.innerHTML=`
    <div class="date-nav">
      <button onclick="chDate(-1)">‹</button>
      <span class="date-label">${fmtDate(S.dateOffset)}</span>
      <button onclick="chDate(1)">›</button>
    </div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sum-num" style="color:var(--green)">${counts.disponivel}</div><div class="sum-label">Disponíveis</div></div>
      <div class="sum-card"><div class="sum-num" style="color:var(--red)">${counts.indisponivel}</div><div class="sum-label">Indisponíveis</div></div>
      <div class="sum-card"><div class="sum-num" style="color:var(--amber)">${counts.manutencao}</div><div class="sum-label">Manutenção</div></div>
      <div class="sum-card"><div class="sum-num" style="color:var(--blue)">${counts.folga}</div><div class="sum-label">Folga</div></div>
      <div class="sum-card"><div class="sum-num" style="color:var(--purple)">${counts.programado||0}</div><div class="sum-label">Prog./Viagem</div></div>
      <div class="sum-card"><div class="sum-num" style="color:var(--lime)">${counts.total}</div><div class="sum-label">Total</div></div>
    </div>

function drawPie(counts){
  const canvas=document.getElementById("pie-chart"); if(!canvas) return;
  const ctx=canvas.getContext("2d");
  const W=canvas.offsetWidth||350; canvas.width=W; canvas.height=180;
  const data=[counts.disponivel,counts.indisponivel,counts.manutencao,counts.folga,counts.programado||0];
  const colors=["#6ee04a","#f06060","#f0be40","#70a8f0","#b07ef0"];
  const labels=["Disponível","Indisponível","Manutenção","Folga","Prog./Viagem"];
  const total=data.reduce((a,b)=>a+b,0)||1;
  const cx=90,cy=90,r=72;
  let start=-Math.PI/2;
  data.forEach((v,i)=>{
    const angle=(v/total)*2*Math.PI;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+angle);
    ctx.fillStyle=colors[i]; ctx.fill(); start+=angle;
  });
  ctx.beginPath(); ctx.arc(cx,cy,38,0,2*Math.PI); ctx.fillStyle="#1c2d12"; ctx.fill();
  ctx.fillStyle="#e4f2c8"; ctx.font="bold 18px DM Sans,sans-serif"; ctx.textAlign="center";
  ctx.fillText(total,cx,cy+6); ctx.font="10px DM Sans,sans-serif"; ctx.fillStyle="rgba(228,242,200,.5)";
  ctx.fillText("total",cx,cy+20); ctx.textAlign="left";
  const lx=195,ly=24;
  labels.forEach((l,i)=>{
    ctx.fillStyle=colors[i]; ctx.beginPath(); ctx.arc(lx+6,ly+i*33+6,6,0,2*Math.PI); ctx.fill();
    ctx.fillStyle="#e4f2c8"; ctx.font="12px DM Sans,sans-serif";
    ctx.fillText(`${l}: ${data[i]}`,lx+17,ly+i*33+11);
  });
}
function drawLine(dates,disp){
  const canvas=document.getElementById("line-chart"); if(!canvas) return;
  const W=canvas.offsetWidth||350; canvas.width=W; canvas.height=180;
  const ctx=canvas.getContext("2d");
  const pad={t:20,r:20,b:40,l:35};
  const W2=W-pad.l-pad.r, H2=180-pad.t-pad.b;
  const maxV=Math.max(...disp,1);
  ctx.strokeStyle="rgba(200,240,50,.12)"; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+H2-i*(H2/4);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+W2,y); ctx.stroke();
    ctx.fillStyle="rgba(228,242,200,.35)"; ctx.font="10px DM Mono,monospace";
    ctx.fillText(Math.round(i*(maxV/4)),4,y+3);
  }
  // gradient fill
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+H2);
  grad.addColorStop(0,"rgba(200,240,50,.18)"); grad.addColorStop(1,"rgba(200,240,50,0)");
  ctx.beginPath();
  disp.forEach((v,i)=>{
    const x=pad.l+i*(W2/(disp.length-1));
    const y=pad.t+H2-(v/maxV)*H2;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+W2,pad.t+H2); ctx.lineTo(pad.l,pad.t+H2);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle="var(--lime)"; ctx.lineWidth=2; ctx.beginPath();
  disp.forEach((v,i)=>{
    const x=pad.l+i*(W2/(disp.length-1));
    const y=pad.t+H2-(v/maxV)*H2;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.fillStyle="var(--lime)";
  disp.forEach((v,i)=>{
    const x=pad.l+i*(W2/(disp.length-1));
    const y=pad.t+H2-(v/maxV)*H2;
    ctx.beginPath(); ctx.arc(x,y,3,0,2*Math.PI); ctx.fill();
  });
  ctx.fillStyle="rgba(228,242,200,.35)"; ctx.font="9px DM Mono,monospace";
  dates.forEach((d,i)=>{ if(i%2===0){ const x=pad.l+i*(W2/(dates.length-1)); ctx.fillText(d.slice(5),x-10,178); } });
}
function drawBar(byCarrier){
  const canvas=document.getElementById("bar-chart"); if(!canvas) return;
  // Increase height to fit full carrier names (two lines)
  const W=canvas.offsetWidth||700; canvas.width=W; canvas.height=200;
  const ctx=canvas.getContext("2d");
  const colors=["#6ee04a","#f06060","#f0be40","#70a8f0","#b07ef0"];
  const statKeys=["disponivel","indisponivel","manutencao","folga","programado"];
  const pad={t:20,r:20,b:55,l:35};
  const W2=W-pad.l-pad.r, H2=200-pad.t-pad.b;
  const grpW=W2/CARRIERS.length, barW=grpW/(statKeys.length+1);
  const maxV=Math.max(...CARRIERS.map(c=>Object.values(byCarrier[c]||{}).reduce((a,b)=>a+b,0)),4);
  // Grid lines
  ctx.strokeStyle="rgba(200,240,50,.1)"; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+H2-i*(H2/4);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+W2,y); ctx.stroke();
    ctx.fillStyle="rgba(228,242,200,.35)"; ctx.font="10px DM Mono,monospace";
    ctx.fillText(Math.round(i*(maxV/4)),4,y+3);
  }
  CARRIERS.forEach((carrier,ci)=>{
    const gx=pad.l+ci*grpW;
    statKeys.forEach((sk,si)=>{
      const v=(byCarrier[carrier]||{})[sk]||0;
      const x=gx+si*barW+barW*.3;
      const h=(v/maxV)*H2||0;
      const barTop=pad.t+H2-h;
      // Draw bar
      ctx.fillStyle=colors[si]; ctx.fillRect(x,barTop,barW*.8,h);
      // Data label on top of bar (only if value > 0)
      if(v>0){
        ctx.fillStyle="#e4f2c8";
        ctx.font="bold 10px DM Sans,sans-serif";
        ctx.textAlign="center";
        ctx.fillText(v, x+barW*.4, barTop-4);
        ctx.textAlign="left";
      }
    });
    // Full carrier name — split into words, max 2 lines
    const words=carrier.split(" ");
    const mid=gx+grpW/2;
    const lineY=pad.t+H2+14;
    ctx.fillStyle="rgba(228,242,200,.6)";
    ctx.textAlign="center";
    if(words.length<=2){
      ctx.font="10px DM Sans,sans-serif";
      ctx.fillText(carrier, mid, lineY);
    } else {
      // Split into two lines: first word on line1, rest on line2
      const line1=words[0];
      const line2=words.slice(1).join(" ");
      ctx.font="10px DM Sans,sans-serif";
      ctx.fillText(line1, mid, lineY);
      ctx.fillText(line2, mid, lineY+13);
    }
    ctx.textAlign="left";
  });
}

}

async function buildRows(dates){

  const rows=[["Data","Transportador","Placa","Operação","Tipo de Veículo","Identificação","Contrato","Capacidade (m³)","Status","Horário"]];
  for(const ds of dates)
    for(const carrier of CARRIERS)
      for(const p of (allP[carrier]||[])){
        const rec=statusMap[`${carrier}||${p.placa}||${ds}`]; // null = não preenchido
        const statusLabel=rec?getSt(rec.status).label:"Não preenchido";
        const timeLabel=rec?rec.time||"—":"—";
        rows.push([fmtDateStr(ds),carrier,p.placa,p.operacao,p.tipo,p.identificacao,p.contrato,p.capacidade,statusLabel,timeLabel]);
      }
  return rows;
}

        <thead><tr><th>PLACA</th><th>OPERAÇÃO</th><th>TIPO</th><th>IDENTIFICAÇÃO</th><th>CONTRATO</th><th>CAPACIDADE</th><th>AÇÕES</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>`;
  }
  if(!listHTML) listHTML=`<div class="empty"><span class="ei">📋</span>Nenhuma placa cadastrada ainda.<br>Use o formulário acima para começar.</div>`;
  body.innerHTML=`
    <div class="card" style="margin-bottom:1.5rem">
      <p class="reg-heading">+ Nova placa</p>
      <div class="form-grid">
        <div class="form-field"><label>TRANSPORTADOR</label><select id="r-carrier">${carrierOpts}</select></div>
        <div class="form-field"><label>OPERAÇÃO</label><select id="r-op">${opOpts}</select></div>
        <div class="form-field"><label>PLACA</label><input id="r-placa" type="text" placeholder="Ex: ABC-1234" style="text-transform:uppercase"></div>
        <div class="form-field"><label>TIPO DE VEÍCULO</label><select id="r-tipo">${tvOpts}</select></div>
        <div class="form-field"><label>IDENTIFICAÇÃO</label><select id="r-id">${idOpts}</select></div>
        <div class="form-field"><label>TIPO DE CONTRATO</label><select id="r-contrato">${ctOpts}</select></div>
        <div class="form-field"><label>CAPACIDADE (m³)</label><input id="r-cap" type="number" placeholder="Ex: 25" min="1" max="999"></div>
      </div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-lime" id="add-btn" onclick="addPlate()">+ Cadastrar placa</button>
        <span id="reg-msg" style="font-size:12px"></span>
      </div>
    </div>
    <p class="sec-title" style="margin-bottom:1rem">Placas cadastradas</p>
    <div id="plates-list">${listHTML}</div>`;
}
async function addPlate(){
  const carrier=document.getElementById("r-carrier").value;
  const operacao=document.getElementById("r-op").value;
  const placa=document.getElementById("r-placa").value.trim().toUpperCase();
  const tipo=document.getElementById("r-tipo").value;
  const identificacao=document.getElementById("r-id").value;
  const contrato=document.getElementById("r-contrato").value;
  const capacidade=document.getElementById("r-cap").value.trim();
  const msg=document.getElementById("reg-msg");
  const btn=document.getElementById("add-btn");
  if(!placa){msg.textContent="Informe a placa.";msg.style.color="var(--red)";return;}
  if(!capacidade||isNaN(capacidade)||+capacidade<=0){msg.textContent="Informe a capacidade.";msg.style.color="var(--red)";return;}
  btn.disabled=true; btn.textContent="Salvando...";
  const allP=await dbGetPlates();
  if(!allP[carrier]) allP[carrier]=[];
  if(CARRIERS.some(c=>(allP[c]||[]).some(p=>p.placa===placa))){
    msg.textContent="Placa já cadastrada.";msg.style.color="var(--red)";
    btn.disabled=false;btn.textContent="+ Cadastrar placa";return;
  }
  allP[carrier].push({placa,operacao,tipo,identificacao,contrato,capacidade:+capacidade});
  await dbSavePlates(allP);
  document.getElementById("r-placa").value="";
  document.getElementById("r-cap").value="";
  msg.textContent=`Placa ${placa} cadastrada!`;msg.style.color="var(--green)";
  showToast(`Placa ${placa} cadastrada!`);
  setTimeout(()=>{msg.textContent="";},3000);
  btn.disabled=false;btn.textContent="+ Cadastrar placa";
  await renderTabBody();
}
async function delPlate(carrier,idx){
  if(!confirm("Remover esta placa?")) return;
  const allP=await dbGetPlates();
  if(!allP[carrier]) return;
  const removed=allP[carrier].splice(idx,1);
  await dbSavePlates(allP);
  showToast(`Placa ${removed[0]?.placa} removida.`);
  await renderTabBody();
}

  // Carriers section
  const carrierRows = CARRIERS.map((c,i)=>`

        </div>
        <button class="btn btn-lime" onclick="addCarrier()" style="margin-bottom:0">+ Adicionar</button>
        <span id="carrier-msg" style="font-size:12px"></span>
      </div>
    </div>

    <!-- CARRIERS LIST -->
    <p class="sec-title" style="margin-bottom:.75rem">Transportadores cadastrados</p>

      <table class="table" style="min-width:360px">
        <thead><tr><th>TRANSPORTADOR</th><th></th></tr></thead>
        <tbody>${carrierRows||'<tr><td colspan="2" style="color:var(--muted);font-size:13px">Nenhum transportador</td></tr>'}</tbody>
      </table>
    </div>

    <!-- NEW USER -->
    <div class="card" style="margin-bottom:1.5rem">
      <p class="reg-heading">+ Novo usuário</p>
      <div class="form-grid">
        <div class="form-field"><label>LOGIN (usuário)</label><input id="new-uid" type="text" placeholder="Ex: souza"></div>
        <div class="form-field"><label>NOME DE EXIBIÇÃO</label><input id="new-uname" type="text" placeholder="Ex: Souza Transportes"></div>
        <div class="form-field"><label>SENHA</label><input id="new-upwd" type="text" placeholder="Mín. 6 caracteres"></div>
        <div class="form-field"><label>PERFIL</label>
          <select id="new-urole" onchange="toggleCarrierField()">
            <option value="carrier">Transportador</option>

          </select>

          <select id="new-ucarrier">${CARRIERS.map(c=>`<option>${c}</option>`).join('')}</select>

    <p class="sec-title" style="margin-bottom:.75rem">Usuários cadastrados</p>
    <div class="tscroll">
      <table class="table" style="min-width:520px">

        <tbody>${userRows}</tbody>
      </table>

}

function toggleCarrierField(){
  const role=document.getElementById('new-urole')?.value;
  const field=document.getElementById('new-carrier-field');
  if(field) field.style.display=role==='admin'?'none':'';
}

async function addCarrier(){
  const name=document.getElementById('new-carrier-name').value.trim();
  const msg=document.getElementById('carrier-msg');
  if(!name){msg.textContent='Informe o nome.';msg.style.color='var(--red)';return;}
  if(CARRIERS.includes(name)){msg.textContent='Transportador já existe.';msg.style.color='var(--red)';return;}
  CARRIERS.push(name);
  await dbSaveCarriers(CARRIERS);
  document.getElementById('new-carrier-name').value='';
  msg.textContent=`${name} adicionado!`;msg.style.color='var(--green)';
  showToast(`Transportador ${name} cadastrado!`);
  setTimeout(()=>{msg.textContent='';},3000);
  await renderTabBody();
}

async function deleteCarrier(idx){
  const name=CARRIERS[idx];
  if(!confirm(`Remover o transportador "${name}"?
Isso não remove as placas já cadastradas.`)) return;
  CARRIERS.splice(idx,1);
  await dbSaveCarriers(CARRIERS);
  showToast(`${name} removido.`);
  await renderTabBody();
}

async function addUser(){
  const uid=document.getElementById('new-uid').value.trim().toLowerCase().replace(/\s/g,'');
  const name=document.getElementById('new-uname').value.trim();
  const pwd=document.getElementById('new-upwd').value.trim();
  const role=document.getElementById('new-urole').value;
  const carrier=role==='carrier'?document.getElementById('new-ucarrier').value:'';
  const msg=document.getElementById('user-msg');
  if(!uid){msg.textContent='Informe o login.';msg.style.color='var(--red)';return;}
  if(!name){msg.textContent='Informe o nome.';msg.style.color='var(--red)';return;}
  if(!pwd||pwd.length<6){msg.textContent='Senha deve ter mín. 6 caracteres.';msg.style.color='var(--red)';return;}
  if(USERS_DB[uid]){msg.textContent='Login já existe.';msg.style.color='var(--red)';return;}
  const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  USERS_DB[uid]={name, role, initials, password:pwd, ...(carrier?{carrier}:{})};
  await dbSaveUsers(USERS_DB);
  ['new-uid','new-uname','new-upwd'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  msg.textContent=`Usuário ${uid} criado!`;msg.style.color='var(--green)';
  showToast(`Usuário ${uid} criado com sucesso!`);
  setTimeout(()=>{msg.textContent='';},3000);
  await renderTabBody();
}

async function deleteUser(uid){
  if(!confirm(`Remover o usuário "${uid}"?`)) return;
  delete USERS_DB[uid];
  await dbSaveUsers(USERS_DB);
  showToast(`Usuário ${uid} removido.`);
  await renderTabBody();
}

function openEditUser(uid){
  const u=USERS_DB[uid];
  if(!u) return;
  const carrierOpts=CARRIERS.map(c=>`<option${c===u.carrier?' selected':''}>${c}</option>`).join('');
  const modal=document.createElement('div');
  modal.id='edit-user-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  modal.innerHTML=`
    <div style="background:var(--mid);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:460px">
      <p style="font-size:15px;font-weight:600;color:var(--lime);margin-bottom:1.25rem">✏️ Editar usuário — ${uid}</p>
      <div class="form-grid">
        <div class="form-field"><label>NOME DE EXIBIÇÃO</label><input id="eu-name" type="text" value="${u.name}"></div>
        <div class="form-field"><label>NOVA SENHA</label><input id="eu-pwd" type="text" placeholder="Deixe em branco para manter" value="${u.password}"></div>
        ${u.role==='carrier'?`<div class="form-field"><label>TRANSPORTADOR</label><select id="eu-carrier">${carrierOpts}</select></div>`:''}
      </div>
      <div style="display:flex;gap:10px;margin-top:1rem;justify-content:flex-end">
        <button class="btn btn-outline" onclick="document.getElementById('edit-user-modal').remove()">Cancelar</button>
        <button class="btn btn-lime" onclick="saveEditUser('${uid}')">💾 Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function saveEditUser(uid){
  const name=document.getElementById('eu-name').value.trim();
  const pwd=document.getElementById('eu-pwd').value.trim();
  const carrierEl=document.getElementById('eu-carrier');
  if(!name){showToast('Informe o nome.',false);return;}
  if(pwd&&pwd.length<6){showToast('Senha deve ter mín. 6 caracteres.',false);return;}
  const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  USERS_DB[uid]={
    ...USERS_DB[uid],
    name,
    initials,
    ...(pwd?{password:pwd}:{}),
    ...(carrierEl?{carrier:carrierEl.value}:{})
  };
  await dbSaveUsers(USERS_DB);
  document.getElementById('edit-user-modal').remove();
  showToast(`Usuário ${uid} atualizado!`);
  await renderTabBody();
}

function openEditModal(carrier, idx){
  const allP=loadPlatesCache||{};
  // fetch fresh
  dbGetPlates().then(allP=>{
    const p=allP[carrier][idx];
    if(!p) return;
    const opOpts=OPERACOES.map(o=>`<option${o===p.operacao?' selected':''}>${o}</option>`).join('');
    const tvOpts=TIPOS_VEIC.map(o=>`<option${o===p.tipo?' selected':''}>${o}</option>`).join('');
    const idOpts=IDENTS.map(o=>`<option${o===p.identificacao?' selected':''}>${o}</option>`).join('');
    const ctOpts=CONTRATOS.map(o=>`<option${o===p.contrato?' selected':''}>${o}</option>`).join('');
    const modal=document.createElement('div');
    modal.id='edit-modal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
    modal.innerHTML=`
      <div style="background:var(--mid);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto">
        <p style="font-size:15px;font-weight:600;color:var(--lime);margin-bottom:1.25rem">✏️ Editar placa — ${p.placa}</p>
        <div class="form-grid">
          <div class="form-field"><label>OPERAÇÃO</label><select id="e-op">${opOpts}</select></div>
          <div class="form-field"><label>TIPO DE VEÍCULO</label><select id="e-tipo">${tvOpts}</select></div>
          <div class="form-field"><label>IDENTIFICAÇÃO</label><select id="e-id">${idOpts}</select></div>
          <div class="form-field"><label>TIPO DE CONTRATO</label><select id="e-contrato">${ctOpts}</select></div>
          <div class="form-field"><label>CAPACIDADE (m³)</label><input id="e-cap" type="number" value="${p.capacidade}" min="1" max="999"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:1rem;justify-content:flex-end">
          <button class="btn btn-outline" onclick="document.getElementById('edit-modal').remove()">Cancelar</button>
          <button class="btn btn-lime" onclick="saveEdit('${carrier}',${idx})">💾 Salvar alterações</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  });
}
async function saveEdit(carrier, idx){
  const operacao=document.getElementById('e-op').value;
  const tipo=document.getElementById('e-tipo').value;
  const identificacao=document.getElementById('e-id').value;
  const contrato=document.getElementById('e-contrato').value;
  const capacidade=document.getElementById('e-cap').value.trim();
  if(!capacidade||isNaN(capacidade)||+capacidade<=0){showToast('Informe a capacidade.',false);return;}
  const allP=await dbGetPlates();
  if(!allP[carrier]||!allP[carrier][idx]) return;
  allP[carrier][idx]={...allP[carrier][idx], operacao, tipo, identificacao, contrato, capacidade:+capacidade};
  await dbSavePlates(allP);
  document.getElementById('edit-modal').remove();
  showToast('Placa atualizada com sucesso!');
  await renderTabBody();
}

<style>

.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:99px;white-space:nowrap;border:1px solid transparent;}
.b-green{background:var(--green-bg);color:var(--green);border-color:rgba(110,224,74,.28);}
.b-red{background:var(--red-bg);color:var(--red);border-color:rgba(240,96,96,.28);}
.b-amber{background:var(--amber-bg);color:var(--amber);border-color:rgba(240,190,64,.28);}
.b-blue{background:var(--blue-bg);color:var(--blue);border-color:rgba(112,168,240,.28);}
.b-lime{background:var(--lime-bg2);color:var(--lime);border-color:var(--border2);}
.b-teal{background:rgba(0,200,140,.12);color:#30d0a0;border-color:rgba(0,200,140,.28);}
.b-gray{background:rgba(228,242,200,.07);color:var(--dim);border-color:var(--border);}
.b-ded{background:var(--blue-bg);color:var(--blue);border-color:rgba(112,168,240,.28);}
.b-spot{background:var(--amber-bg);color:var(--amber);border-color:rgba(240,190,64,.28);}
.b-purple{background:rgba(176,126,240,.12);color:#b07ef0;border-color:rgba(176,126,240,.28);}
.b-blank{background:rgba(228,242,200,.06);color:rgba(228,242,200,.35);border-color:rgba(228,242,200,.15);font-style:italic;}
.st-blank{background:rgba(228,242,200,.05);color:rgba(228,242,200,.35);border-color:rgba(228,242,200,.15);font-size:12px;padding:5px 9px;border-radius:7px;cursor:pointer;border:1px solid;outline:none;}
.time-sel{font-size:12px;padding:5px 9px;border-radius:7px;cursor:pointer;border:1px solid;outline:none;font-family:'DM Mono',monospace;}
.time-filled{background:var(--lime-bg2);color:var(--lime);border-color:var(--border2);}
.time-blank{background:rgba(228,242,200,.05);color:rgba(228,242,200,.3);border-color:rgba(228,242,200,.12);}
.time-sel:disabled{opacity:.35;cursor:not-allowed;}
.time-na{background:rgba(240,96,96,.07);color:rgba(240,96,96,.35);border-color:rgba(240,96,96,.15);font-size:12px;padding:5px 9px;border-radius:7px;border:1px solid;outline:none;font-family:'DM Mono',monospace;}
.time-sel option{background:#111d0a;color:#e4f2c8;}
.cap-tag{font-size:11px;color:var(--lime);background:var(--lime-bg);padding:3px 8px;border-radius:99px;border:1px solid var(--border);font-family:'DM Mono',monospace;}
.tscroll{overflow-x:auto;}
.table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.table th{padding:10px 14px;font-size:11px;font-weight:500;color:var(--muted);text-align:left;background:rgba(200,240,50,.04);border-bottom:1px solid var(--border);letter-spacing:.06em;}
.table td{padding:10px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;}
.table tr:last-child td{border-bottom:none;}
.table tbody tr:hover{background:var(--lime-bg);}
.st-sel{font-size:12px;padding:5px 9px;border-radius:7px;cursor:pointer;border:1px solid;outline:none;}
.st-disp{background:var(--green-bg);color:var(--green);border-color:rgba(110,224,74,.3);}
.st-indisp{background:var(--red-bg);color:var(--red);border-color:rgba(240,96,96,.3);}
.st-manut{background:var(--amber-bg);color:var(--amber);border-color:rgba(240,190,64,.3);}
.st-folga{background:var(--blue-bg);color:var(--blue);border-color:rgba(112,168,240,.3);}
.st-prog{background:rgba(176,126,240,.12);color:#b07ef0;border-color:rgba(176,126,240,.3);}
.st-sel option{background:#111d0a;color:#e4f2c8;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 12px;text-align:center;}
.sum-num{font-size:28px;font-weight:600;line-height:1;}
.sum-label{font-size:11px;color:var(--muted);margin-top:5px;}
.carrier-block{margin-bottom:1.5rem;}
.carrier-head{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--lime-bg);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;font-size:13px;font-weight:500;}
.carrier-head .ch-icon{font-size:16px;}
.carrier-head .ch-count{font-size:11px;font-weight:400;color:var(--muted);margin-left:4px;}
.date-nav{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;}
.date-nav button{background:none;border:1px solid var(--border2);border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;transition:all .15s;}
.date-nav button:hover{border-color:var(--lime);color:var(--lime);}
.date-label{font-size:14px;font-weight:500;flex:1;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:1.25rem;}
.form-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500;letter-spacing:.05em;}
.form-field input,.form-field select{width:100%;background:var(--dark);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;}
.form-field input:focus,.form-field select:focus{border-color:var(--lime);}
.form-field select option{background:#111d0a;color:#e4f2c8;}
.toast{position:fixed;bottom:24px;right:24px;border-radius:var(--radius);padding:11px 18px;font-size:13px;font-weight:600;display:none;align-items:center;gap:8px;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.5);max-width:320px;}
.toast.show{display:flex;}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--red);position:absolute;top:3px;right:3px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.notif-btn{position:relative;background:none;border:1px solid var(--border2);border-radius:7px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;}
.notif-btn:hover{border-color:var(--lime);}
.notif-panel{position:absolute;top:54px;right:1.5rem;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-lg);width:320px;max-height:400px;overflow-y:auto;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.notif-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;line-height:1.6;}
.notif-item:last-child{border-bottom:none;}
.ni-time{font-size:11px;color:var(--muted);margin-top:3px;}
.notif-empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;}
.chart-title{font-size:13px;font-weight:500;margin-bottom:1rem;color:var(--dim);}
canvas{display:block;width:100%!important;}
.sec-title{font-size:16px;font-weight:500;margin-bottom:.25rem;}
.sec-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem;}
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
.filters-bar select{font-size:13px;background:var(--dark);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:8px 12px;outline:none;}
.filters-bar select:focus{border-color:var(--lime);}
.filters-bar select option{background:#111d0a;color:#e4f2c8;}
.empty{padding:3rem 2rem;text-align:center;color:var(--muted);font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);line-height:1.8;}
.empty .ei{font-size:32px;display:block;margin-bottom:12px;opacity:.3;}
.reg-heading{font-size:13px;font-weight:600;color:var(--lime);margin-bottom:1rem;display:flex;align-items:center;gap:7px;letter-spacing:.04em;}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted);font-size:13px;gap:12px;}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--lime);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:700px){.dash-grid{grid-template-columns:1fr;}}
@media(max-width:640px){.main{padding:1rem;}.topbar{padding:0 1rem;}.topbar-sub,.topbar-div,.user-name{display:none;}}
</style>
</head>

<div class="app" id="app"><div class="loading" style="min-height:100vh"><span class="spin"></span>Iniciando o sistema...</div></div>
<div class="toast" id="toast">✓ <span id="toast-msg"></span></div>
  <div style="background:var(--mid);border-top:1px solid rgba(200,240,50,.08);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:'DM Sans',sans-serif;">
    <div style="font-size:11px;color:rgba(228,242,200,.25);letter-spacing:.04em;">
      Desenvolvido por <span style="color:rgba(200,240,50,.45);font-weight:500;">Natanael Lopes Pires</span> &nbsp;·&nbsp; NEXTA Gestão de Frota
    </div>
    <div style="font-size:11px;color:rgba(228,242,200,.22);font-style:italic;text-align:right;max-width:420px;line-height:1.6;letter-spacing:.02em;">
      💚 <span style="color:rgba(200,240,50,.35);">"Sentimento de dono, de uma equipe que se realiza com as conquistas."</span>
    </div>
  </div>
</body>
